<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>동전 던지기 게임</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem 1rem 4rem; }
    .game-wrap { width: 100%; max-width: 480px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat-card { background: #ebebeb; border-radius: 8px; padding: 0.75rem 1rem; text-align: center; }
    .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 500; color: #111; }
    .coin-area { display: flex; flex-direction: column; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .coin { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid #ccc; background: #ebebeb; }
    .coin.flipping { animation: spin 0.6s ease-out; }
    @keyframes spin {
      0% { transform: rotateY(0deg) scale(1); }
      50% { transform: rotateY(900deg) scale(0.8); }
      100% { transform: rotateY(1800deg) scale(1); }
    }
    .result-msg { text-align: center; font-size: 15px; font-weight: 500; min-height: 24px; }
    .result-win { color: #0F6E56; }
    .result-lose { color: #993C1D; }
    .info-bar { display: flex; justify-content: center; gap: 16px; font-size: 13px; color: #888; background: #ebebeb; border-radius: 8px; padding: 8px 12px; text-align: center; }
    .info-bar span { font-weight: 500; color: #111; }
    .divider { border: none; border-top: 1px solid #ddd; margin: 1rem 0; }
    .bet-area { display: flex; flex-direction: column; gap: 12px; }
    .bet-row { display: flex; align-items: center; gap: 12px; }
    .bet-row label { font-size: 14px; color: #888; min-width: 60px; }
    .choice-btns { display: flex; gap: 8px; }
    .choice-btn { padding: 10px 22px; border-radius: 8px; border: 2px solid #bbb; background: #fff; color: #333; cursor: pointer; font-size: 14px; font-weight: 500; }
    .choice-btn:hover { background: #f0f0f0; }
    .mult-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .mult-btn { padding: 8px 14px; border-radius: 8px; border: 2px solid #bbb; background: #fff; color: #333; cursor: pointer; font-size: 13px; font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 2px; line-height: 1.2; }
    .mult-btn:hover { background: #f0f0f0; }
    .mult-btn .prob { font-size: 11px; color: #888; font-weight: 400; }
    .bet-input-wrap { display: flex; align-items: center; gap: 8px; flex: 1; }
    .bet-input { width: 100px; padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #111; font-size: 14px; }
    .quick-btns { display: flex; gap: 6px; }
    .quick-btn { padding: 6px 12px; font-size: 12px; border-radius: 8px; border: 1px solid #bbb; background: #fff; color: #555; cursor: pointer; font-weight: 500; }
    .quick-btn:hover { background: #f0f0f0; }
    .flip-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #378ADD; color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: opacity 0.15s; }
    .flip-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .flip-btn:not(:disabled):hover { opacity: 0.88; }
    .log-area { margin-top: 2rem; }
    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .log-title { font-size: 13px; color: #888; }
    .log-clear-btn { font-size: 12px; color: #888; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 4px 10px; cursor: pointer; }
    .log-clear-btn:hover { background: #f0f0f0; }
    .log-list { display: flex; flex-direction: column; gap: 4px; }
    .log-empty { font-size: 13px; color: #888; padding: 6px 8px; }
    .log-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 8px 10px; border-radius: 8px; background: #ebebeb; }
    .log-win { border-left: 3px solid #1D9E75; }
    .log-lose { border-left: 3px solid #D85A30; }
    .log-left { display: flex; flex-direction: column; gap: 2px; }
    .log-num { font-size: 11px; color: #aaa; }
    .log-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .log-amount { font-weight: 500; }
    .log-balance { font-size: 11px; }
  </style>
</head>
<body>
<div class="game-wrap">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">잔액</div><div class="stat-value" id="balance">1,000</div></div>
    <div class="stat-card"><div class="stat-label">총 손익</div><div class="stat-value" id="profit" style="color:#888;">+0</div></div>
    <div class="stat-card"><div class="stat-label">승리</div><div class="stat-value" id="wins" style="color:#0F6E56;">0</div></div>
    <div class="stat-card"><div class="stat-label">패배</div><div class="stat-value" id="losses" style="color:#993C1D;">0</div></div>
  </div>
 
  <div class="coin-area">
    <div class="coin" id="coin">🪙</div>
    <div class="result-msg" id="result-msg"></div>
  </div>
 
  <div class="info-bar">
    배율 <span id="cur-mult">-</span> &nbsp;|&nbsp; 당첨 확률 <span id="cur-prob">-</span> &nbsp;|&nbsp; 예상 수익 <span id="cur-prize">-</span>
  </div>
 
  <hr class="divider">
 
  <div class="bet-area">
    <div class="bet-row">
      <label>선택</label>
      <div class="choice-btns">
        <button class="choice-btn" id="btn-heads" onclick="selectChoice('heads')">앞면 👑</button>
        <button class="choice-btn" id="btn-tails" onclick="selectChoice('tails')">뒷면 🌙</button>
      </div>
    </div>
 
    <div class="bet-row" style="align-items:flex-start;">
      <label style="padding-top:6px;">배율</label>
      <div class="mult-btns" id="mult-btns"></div>
    </div>
 
    <div class="bet-row">
      <label>베팅액</label>
      <div class="bet-input-wrap">
        <input class="bet-input" type="number" id="bet-amount" value="100" min="1" oninput="updateInfoBar()" />
        <div class="quick-btns">
          <button class="quick-btn" onclick="setBet(0.25)">1/4</button>
          <button class="quick-btn" onclick="setBet(0.5)">절반</button>
          <button class="quick-btn" onclick="setBet(1)">전액</button>
        </div>
      </div>
    </div>
 
    <button class="flip-btn" id="flip-btn" onclick="flip()" disabled>선택 후 던지기</button>
  </div>
 
  <div class="log-area">
    <div class="log-header">
      <div class="log-title" id="log-title">게임 기록</div>
      <button class="log-clear-btn" onclick="clearLog()">기록 지우기</button>
    </div>
    <div class="log-list" id="log-list">
      <div class="log-empty">아직 게임 기록이 없어요.</div>
    </div>
  </div>
</div>
 
<script>
  const MULT_CONFIG = [
    { mult: 1,  prob: 0.49, label: '1배',  probLabel: '49%' },
    { mult: 2,  prob: 0.45, label: '2배',  probLabel: '45%' },
    { mult: 3,  prob: 0.38, label: '3배',  probLabel: '38%' },
    { mult: 5,  prob: 0.28, label: '5배',  probLabel: '28%' },
    { mult: 10, prob: 0.18, label: '10배', probLabel: '18%' },
  ];
 
  let balance = 1000, wins = 0, losses = 0, profit = 0;
  let choice = null, flipping = false, selectedMult = null, gameCount = 0;
  const logs = [];
 
  function fmt(n) {
    if (n < 0) return '-' + Math.abs(n).toLocaleString();
    return n.toLocaleString();
  }
 
  function updateStats() {
    const balEl = document.getElementById('balance');
    balEl.textContent = fmt(balance);
    balEl.style.color = balance < 0 ? '#993C1D' : '#111';
    const pEl = document.getElementById('profit');
    pEl.textContent = (profit >= 0 ? '+' : '') + fmt(profit);
    pEl.style.color = profit > 0 ? '#0F6E56' : profit < 0 ? '#993C1D' : '#888';
    document.getElementById('wins').textContent = wins;
    document.getElementById('losses').textContent = losses;
  }
 
  function updateInfoBar() {
    const bet = parseInt(document.getElementById('bet-amount').value) || 0;
    if (selectedMult) {
      document.getElementById('cur-mult').textContent = selectedMult.label;
      document.getElementById('cur-prob').textContent = selectedMult.probLabel;
      document.getElementById('cur-prize').textContent = bet > 0 ? '+' + fmt(bet * selectedMult.mult) + '원' : '-';
    } else {
      document.getElementById('cur-mult').textContent = '-';
      document.getElementById('cur-prob').textContent = '-';
      document.getElementById('cur-prize').textContent = '-';
    }
  }
 
  function buildMultBtns() {
    const wrap = document.getElementById('mult-btns');
    wrap.innerHTML = MULT_CONFIG.map((c, i) => `
      <button class="mult-btn" id="mult-btn-${i}" onclick="selectMult(${i})">
        <span>${c.label}</span>
        <span class="prob">${c.probLabel}</span>
      </button>
    `).join('');
  }
 
  function selectMult(idx) {
    selectedMult = MULT_CONFIG[idx];
    MULT_CONFIG.forEach((_, i) => {
      const b = document.getElementById('mult-btn-' + i);
      if (i === idx) {
        b.style.background = '#378ADD';
        b.style.borderColor = '#185FA5';
        b.style.color = '#ffffff';
        b.querySelector('.prob').style.color = '#B5D4F4';
      } else {
        b.style.background = '#fff';
        b.style.borderColor = '#bbb';
        b.style.color = '#333';
        b.querySelector('.prob').style.color = '';
      }
    });
    updateInfoBar();
    checkFlipReady();
  }
 
  function selectChoice(c) {
    choice = c;
    const hBtn = document.getElementById('btn-heads');
    const tBtn = document.getElementById('btn-tails');
    hBtn.style.background = c === 'heads' ? '#378ADD' : '#fff';
    hBtn.style.borderColor = c === 'heads' ? '#185FA5' : '#bbb';
    hBtn.style.color = c === 'heads' ? '#ffffff' : '#333';
    tBtn.style.background = c === 'tails' ? '#378ADD' : '#fff';
    tBtn.style.borderColor = c === 'tails' ? '#185FA5' : '#bbb';
    tBtn.style.color = c === 'tails' ? '#ffffff' : '#333';
    checkFlipReady();
  }
 
  function checkFlipReady() {
    document.getElementById('flip-btn').disabled = !(choice && selectedMult);
  }
 
  function setBet(ratio) {
    const base = balance > 0 ? balance : 100;
    document.getElementById('bet-amount').value = Math.max(1, Math.floor(base * ratio));
    updateInfoBar();
  }
 
  function flip() {
    if (flipping || !choice || !selectedMult) return;
    const bet = parseInt(document.getElementById('bet-amount').value);
    if (isNaN(bet) || bet < 1) { alert('베팅액을 올바르게 입력해주세요.'); return; }
 
    flipping = true;
    document.getElementById('flip-btn').disabled = true;
    const coin = document.getElementById('coin');
    coin.className = 'coin flipping';
    coin.textContent = '🪙';
    document.getElementById('result-msg').textContent = '';
 
    setTimeout(() => {
      const won = Math.random() < selectedMult.prob;
      coin.className = 'coin';
      coin.textContent = won
        ? (choice === 'heads' ? '👑' : '🌙')
        : (choice === 'heads' ? '🌙' : '👑');
 
      const msgEl = document.getElementById('result-msg');
      const prize = bet * selectedMult.mult;
      gameCount++;
 
      if (won) {
        balance += prize; profit += prize; wins++;
        msgEl.textContent = `승리! +${fmt(prize)}원 (${selectedMult.label})`;
        msgEl.className = 'result-msg result-win';
      } else {
        balance -= bet; profit -= bet; losses++;
        msgEl.textContent = `패배! -${fmt(bet)}원`;
        msgEl.className = 'result-msg result-lose';
      }
 
      logs.unshift({
        won, bet,
        prize: won ? prize : bet,
        mult: selectedMult.label,
        balance,
        choiceLabel: choice === 'heads' ? '앞면 👑' : '뒷면 🌙',
        resultLabel: won
          ? (choice === 'heads' ? '👑' : '🌙')
          : (choice === 'heads' ? '🌙' : '👑'),
        num: gameCount
      });
 
      renderLog(); updateStats(); updateInfoBar();
      document.getElementById('flip-btn').disabled = false;
      flipping = false;
    }, 650);
  }
 
  function renderLog() {
    const list = document.getElementById('log-list');
    document.getElementById('log-title').textContent = `게임 기록 (${logs.length}판)`;
    if (!logs.length) {
      list.innerHTML = '<div class="log-empty">아직 게임 기록이 없어요.</div>';
      return;
    }
    list.innerHTML = logs.map(l => `
      <div class="log-item ${l.won ? 'log-win' : 'log-lose'}">
        <div class="log-left">
          <div class="log-num">#${l.num}</div>
          <div>${l.choiceLabel} → ${l.resultLabel} · ${l.mult}</div>
        </div>
        <div class="log-right">
          <div class="log-amount" style="color:${l.won ? '#0F6E56' : '#993C1D'};">
            ${l.won ? '+' : '-'}${fmt(l.prize)}원
          </div>
          <div class="log-balance" style="color:${l.balance < 0 ? '#993C1D' : '#888'};">
            잔액 ${fmt(l.balance)}원
          </div>
        </div>
      </div>`).join('');
  }
 
  function clearLog() {
    if (!logs.length) return;
    if (confirm('게임 기록을 모두 지울까요?')) {
      logs.length = 0;
      gameCount = 0;
      renderLog();
    }
  }
 
  buildMultBtns();
  updateStats();
  updateInfoBar();
</script>
</body>
</html>
